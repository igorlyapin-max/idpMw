services:
  idmmw:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        PRISMA_SCHEMA: ${PRISMA_SCHEMA:-prisma/schema.prisma}
    image: ${IDMMW_IMAGE:-idmmw:prod-ha}
    env_file:
      - ${IDMMW_ENV_FILE:-./profiles/prod-ha-yugabyte.env.example}
    expose:
      - '3010'
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3010/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
